<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyss Manager</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }
        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            background: #2a2a2a;
            border: none;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 16px;
        }
        button {
            padding: 12px 24px;
            background: #4a4a4a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover {
            background: #666666;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            background: #2a2a2a;
            padding: 14px 16px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }
        li.completed {
            opacity: 0.6;
            text-decoration: line-through;
            color: #888;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #ffffff;
        }
        .delete-btn {
            margin-left: auto;
            background: transparent;
            color: #ff5555;
            padding: 6px 10px;
            font-size: 18px;
            cursor: pointer;
        }
        .delete-btn:hover {
            color: #ff7777;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ABYSS MANAGER</h1>
        
        <div class="input-area">
            <input type="text" id="taskInput" placeholder="Enter a new task...">
            <button onclick="addTask()">Add Task</button>
        </div>
        
        <ul id="taskList"></ul>
        
        <div class="footer">
            Tasks are merely illusions of control.<br>
            Master them, or be mastered.
        </div>
    </div>

    <script>
        const taskList = document.getElementById('taskList');
        const taskInput = document.getElementById('taskInput');

        function addTask() {
            const taskText = taskInput.value.trim();
            if (taskText === '') return;

            const li = document.createElement('li');
            
            li.innerHTML = `
                <input type="checkbox" onchange="toggleComplete(this)">
                <span>${taskText}</span>
                <button class="delete-btn" onclick="deleteTask(this)">×</button>
            `;
            
            taskList.appendChild(li);
            taskInput.value = '';
        }

        function toggleComplete(checkbox) {
            const li = checkbox.parentElement;
            li.classList.toggle('completed', checkbox.checked);
        }

        function deleteTask(button) {
            const li = button.parentElement;
            li.remove();
        }

        // Allow pressing Enter to add task
        taskInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });
    </script>
</body>
</html>
